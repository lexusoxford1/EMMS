{% extends "base.html" %}

{% block content %}
<section class="content-card">
    <h2>Add Employee</h2>
    <p class="muted">Create a new employee profile for attendance and leave tracking.</p>
    <p class="muted">A unique employee ID will be generated automatically when you save.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit">Save Employee</button>
            <a href="{% url 'employee_list' %}" class="btn btn-soft">Back to List</a>
        </div>
    </form>
</section>
{% endblock %}
